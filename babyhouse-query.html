<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>嬰之房｜寄庫查詢</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","PingFang TC",sans-serif;background:#FDF8F4;color:#1A1A2E;min-height:100vh}
header{background:#fff;border-bottom:1px solid #E8E0D8;padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,0.07);position:sticky;top:0;z-index:10}
header .logo{font-size:22px}
header .title{font-weight:700;font-size:16px}
main{max-width:480px;margin:0 auto;padding:24px 16px 60px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(61,126,170,0.10);margin-bottom:14px}
.hero{text-align:center;margin-bottom:20px}
.hero .icon{font-size:48px}
.hero h1{font-size:20px;font-weight:800;margin-top:10px}
.hero p{color:#6B7280;font-size:14px;margin-top:6px;line-height:1.6}
input[type=tel]{width:100%;border:1.5px solid #E8E0D8;border-radius:10px;padding:13px 14px;font-size:16px;color:#1A1A2E;background:#fff;outline:none;margin-bottom:12px;font-family:inherit}
input:focus{border-color:#3D7EAA}
.btn{width:100%;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-primary{background:#3D7EAA;color:#fff}
.btn-secondary{background:#E8E0D8;color:#1A1A2E;margin-top:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.stat-box{border-radius:12px;padding:14px;text-align:center}
.num{font-size:28px;font-weight:800}
.lbl{font-size:11px;color:#6B7280;margin-top:3px}
.box-green{background:#E8F7EF}.box-green .num{color:#4CAF82}
.box-orange{background:#FEF0E9}.box-orange .num{color:#F4956A}
.box-red{background:#FDECEA}.box-red .num{color:#E05A4E}
.box-purple{background:#EFEDFA}.box-purple .num{color:#7C6FCD}
.warn{border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;margin-top:8px}
.warn-orange{background:#FEF0E9;color:#F4956A}
.warn-red{background:#FDECEA;color:#E05A4E}
.brand-box{background:#EAF3FA;border-radius:10px;padding:11px 14px;font-size:13px;margin-top:10px;line-height:1.8}
.toy-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #E8E0D8;font-size:14px}
.toy-item:last-child{border-bottom:none}
.not-found{background:#FDECEA;border-radius:12px;padding:20px;text-align:center;color:#E05A4E;font-weight:600}
.section-title{font-size:13px;font-weight:700;color:#6B7280;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E8E0D8}
footer{text-align:center;color:#B0A8A0;font-size:12px;margin-top:24px}
</style>
</head>
<body>
<header>
  <span class="logo">🍼</span>
  <span class="title">嬰之房｜寄庫查詢</span>
</header>
<main>
  <div class="card" id="searchCard">
    <div class="hero">
      <div class="icon">🔍</div>
      <h1>查詢我的寄庫狀態</h1>
      <p>輸入您的手機號碼<br>即可查詢奶粉庫存與玩具積分</p>
    </div>
    <input type="tel" id="phoneInput" placeholder="請輸入手機號碼，例：0912345678" inputmode="numeric" maxlength="20"/>
    <button class="btn btn-primary" onclick="doSearch()">查 詢</button>
  </div>
  <div id="result"></div>
  <footer>嬰之房 彰化門市｜如有疑問請洽店員</footer>
</main>
<script>
const SUPA_URL="https://qkzduydrneoziqewtgkr.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFremR1eWRybmVvemlxZXd0Z2tyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MDQ1NTUsImV4cCI6MjA5ODA4MDU1NX0.AzlG1M4da5MU7bAuJUnMLcnJ4kitRy_25MQM3pPX01I";
const h={"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY};

async function doSearch(){
  const raw=document.getElementById("phoneInput").value.trim().replace(/[-\s]/g,"");
  if(!raw)return;
  document.getElementById("result").innerHTML='<div style="text-align:center;padding:20px;color:#6B7280">查詢中…</div>';
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/rpc/public_customer_lookup`,{method:"POST",headers:{...h,"Content-Type":"application/json"},body:JSON.stringify({p_phone:raw})});
    if(!res.ok) throw new Error("查詢失敗");
    const c=await res.json();
    if(!c){
      document.getElementById("result").innerHTML='<div class="not-found">查無此電話的寄庫紀錄<br><span style="font-size:13px;font-weight:400;margin-top:4px;display:block">請洽詢店員，謝謝 🙏</span></div>';
      return;
    }
    const milkRem=c.milk_remaining;
    const activeEx=c.active_toys||[];
    const mc=milkRem===0?"box-red":milkRem<=2?"box-orange":"box-green";
    const warn=milkRem===0?'<div class="warn warn-red">❗ 奶粉已全部取出，請補貨或洽詢店員</div>':
      milkRem<=2?`<div class="warn warn-orange">⚠️ 奶粉快沒囉！剩 ${milkRem} 罐，請記得補貨</div>`:"";
    const annHTML=c.announcement?`<div class="brand-box" style="background:#FFF9E6;color:#B7791F">📢 ${c.announcement}</div>`:"";
    const toyHTML=activeEx.length?`
<div class="card">
  <div class="section-title">🟡 玩具兌換中（${activeEx.length} 件）</div>
  ${activeEx.map(t=>`<div class="toy-item"><span style="font-size:18px">🧸</span><div style="flex:1"><b>${t.name}</b><div style="font-size:12px;color:#6B7280">兌換日：${t.exchange_date}</div></div></div>`).join("")}
</div>`:"";
    document.getElementById("result").innerHTML=`
<div class="card">
  <div style="font-size:20px;font-weight:800">${c.name} 您好 👋</div>
  <div style="color:#6B7280;font-size:13px;margin-top:3px">${c.phone}</div>
  <div class="stat-grid">
    <div class="stat-box ${mc}"><div class="num">${milkRem}</div><div class="lbl">🍼 奶粉剩餘（罐）</div></div>
    <div class="stat-box box-purple"><div class="num">${c.toy_points||0}</div><div class="lbl">🧸 玩具積分（點）</div></div>
  </div>
  <div class="brand-box">奶粉品牌：<b>${c.brand}</b>　品項：<b>${c.item}</b>${c.note?`<br>備註：${c.note}`:""}</div>
  ${annHTML}
  ${warn}
</div>
${toyHTML}
<button class="btn btn-secondary" onclick="reset()">重新查詢</button>`;
  }catch(e){
    document.getElementById("result").innerHTML=`<div class="not-found">查詢失敗，請稍後再試</div>`;
  }
}

function reset(){
  document.getElementById("phoneInput").value="";
  document.getElementById("result").innerHTML="";
  document.getElementById("phoneInput").focus();
  window.scrollTo({top:0,behavior:"smooth"});
}

document.getElementById("phoneInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
</script>
</body>
</html>
